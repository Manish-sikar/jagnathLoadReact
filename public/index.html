<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Expired</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#fff;
}

.container{
    width:90%;
    max-width:700px;
    background:#ffffff;
    color:#333;
    border-radius:15px;
    padding:40px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.icon{
    font-size:70px;
    margin-bottom:20px;
}

h1{
    color:#e11d48;
    margin-bottom:15px;
}

p{
    font-size:18px;
    line-height:1.8;
    margin-bottom:20px;
}

.notice{
    background:#fff4e5;
    color:#a16207;
    border-left:5px solid #f59e0b;
    padding:15px;
    border-radius:8px;
    margin:25px 0;
}

.btn{
    display:inline-block;
    background:#2563eb;
    color:#fff;
    text-decoration:none;
    padding:15px 35px;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.footer{
    margin-top:30px;
    color:#777;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

    <div class="icon">⚠️</div>

    <h1>Website Temporarily Unavailable</h1>

    <p>
        Your <strong>Domain</strong> and <strong>Web Hosting</strong> services have expired.
    </p>

    <div class="notice">
        Please deposit the renewal amount to reactivate your website.
        After successful payment, your website will be restored automatically.
    </div>

    <a href="#" class="btn">
        Renew Now
    </a>

    <div class="footer">
        For payment or support, please contact your website administrator.
    </div>

</div>

</body>
</html>
